<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Semanal — Los Silos CF</title>
<style>
:root{
  --azul:#1A3A6B;--azul2:#2E5FAC;--rojo:#C0392B;--verde:#1E7B34;
  --naranja:#E8771A;--amarillo:#F39C12;--gris:#F0F4F8;
  --font:Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gris)}

/* APP BAR */
.topbar{background:var(--azul);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.btn-back{width:36px;height:36px;border-radius:50%;border:none;background:#fff2;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.topbar h1{font-size:16px;font-weight:700;flex:1}
.btn-pdf{background:#fff;color:var(--azul);border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}

.loading{text-align:center;padding:60px;color:#999}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:32px;height:32px;border:3px solid #eee;border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}

#documento{display:none}

/* ── DOCUMENTO ── */
.doc{width:100%;background:#fff;font-family:Arial,sans-serif}

/* HEADER */
.doc-header{display:flex;align-items:stretch;background:#fff;border-bottom:4px solid var(--azul)}
.hdr-logo-left{width:60px;background:var(--azul);display:flex;align-items:center;justify-content:center;padding:8px}
.hdr-logo-left img{width:44px;height:44px;object-fit:contain}
.hdr-logo-left .logo-placeholder{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:900;color:var(--azul);text-align:center;line-height:1.2}
.hdr-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.hdr-club{font-size:15px;font-weight:900;color:var(--azul);letter-spacing:1px;text-transform:uppercase}
.hdr-semana{font-size:18px;font-weight:900;color:var(--naranja);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.hdr-logo-right{width:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;border-left:2px solid #eee}
.hdr-logo-right .pat-label{font-size:6px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.hdr-logo-right img{max-width:70px;max-height:40px;object-fit:contain}
.hdr-logo-right .pat-placeholder{width:70px;height:38px;border:1.5px dashed #ddd;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#ccc}
.hdr-ffcv{width:44px;display:flex;align-items:center;justify-content:center;padding:8px;border-left:1px solid #eee}
.hdr-ffcv img{width:32px;height:32px;object-fit:contain}
.hdr-ffcv .ffcv-ph{width:32px;height:32px;background:var(--naranja);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:900;color:#fff}

/* SECCIÓN */
.seccion{margin:0}
.sec-titulo{padding:5px 12px;font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#fff;text-align:center}
.sec-titulo.f11{background:var(--rojo)}
.sec-titulo.f8{background:var(--verde)}

/* TABLA */
.tabla{width:100%;border-collapse:collapse}
.tabla thead th{
  background:var(--azul);color:#fff;
  padding:5px 6px;font-size:8px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;
  border:1px solid #15306b;text-align:center
}
.tabla thead th.th-cat{text-align:left}
.tabla tbody tr{border-bottom:1px solid #e8ecf0}
.tabla tbody tr:nth-child(even){background:#f8fafc}
.tabla tbody tr:hover{background:#eef4fb}
.tabla td{padding:5px 6px;border-right:1px solid #e8ecf0;vertical-align:middle;font-size:9px}
.td-cat{font-weight:700;color:var(--azul);font-size:8.5px;line-height:1.3}
.td-dia{text-align:center;font-weight:900;font-size:9px;white-space:nowrap;color:#1A1A1A;line-height:1.4}
.td-dia .fecha{font-size:10px;color:var(--azul)}
.td-dia .hora{font-size:9px;color:var(--naranja);font-weight:700}
.td-equipo{text-align:center;font-size:11px;font-weight:700;color:#333;text-transform:capitalize}
.td-equipo.nuestro{color:#0A1F3D;font-weight:900;font-size:13px;letter-spacing:.5px;text-transform:uppercase}
.td-campo{text-align:center;font-size:7.5px;line-height:1.3}
.td-campo.propio{background:#FFF9C4;color:#856D00;font-weight:700}
.td-char{text-align:center;font-size:7.5px;font-weight:700;color:var(--verde)}
.td-none{text-align:center;color:#bbb;font-style:italic;font-size:8px}

/* SEPARADOR */
.sep{height:4px;background:linear-gradient(90deg,var(--rojo),var(--verde))}

/* FOOTER */
.doc-footer{display:flex;justify-content:space-between;padding:5px 12px;background:#f5f5f5;border-top:1px solid #ddd;font-size:7px;color:#999}

/* PRINT */
@media print{
  .topbar,.btn-pdf,.loading{display:none!important}
  body{background:#fff}
  #documento{display:block!important}
  .doc{width:100%}
  @page{size:A4 landscape;margin:5mm 8mm}
  .tabla td,.tabla th{font-size:7.5px!important;padding:3.5px 4px!important}
  .td-dia .fecha{font-size:8.5px!important}
  .td-dia .hora{font-size:8px!important}
  .tabla tbody tr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sec-titulo,.tabla thead th,.hdr-logo-left,.doc-footer{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

@media screen{
  #documento{max-width:960px;margin:16px auto;padding:0 12px 40px}
  .doc{border-radius:8px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.12)}
}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <button class="btn-back" onclick="history.back()">&#8249;</button>
  <h1>📅 Calendario semanal</h1>
  <button class="btn-pdf" onclick="window.print()">📥 PDF</button>
  <button class="btn-pdf" style="background:var(--verde);color:#fff;margin-left:6px" onclick="abrirModalEmail()">📧 Email</button>
  <button class="btn-pdf" style="background:#25D366;color:#fff;margin-left:6px" onclick="compartirWhatsApp()">💬 WA</button>
</div>

<div class="loading" id="loading">
  <div><div class="spin"></div></div>
  Cargando partidos de la semana...
</div>

<div id="documento"></div>

<script>
var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbznhX5VgsCZPkFoyGLpQ3fUXyWEY0VFMRkMPy7DVsRkIEl4n3zqUbQvfj9Q7k1ltnUj/exec';

var EQUIPOS_F11 = [
  {cat:'AMATEUR A - TERCERA FFCV G-8',       key:'amateur'},
  {cat:'JUVENIL A - 3a FFCV JUVENIL G-10',   key:'juvenil_a'},
  {cat:'JUVENIL B - 3a FFCV JUVENIL G-12',   key:'juvenil_b'},
  {cat:'CADETE A - 1a REGIONAL G-4',         key:'cadete_a'},
  {cat:'CADETE B - 2a REGIONAL G-7',         key:'cadete_b'},
  {cat:'CADETE FEMENINO G-2',              key:'cadete_femenino'},
  {cat:'INFANTIL A - 2a REGIONAL G-9',       key:'infantil_a'},
  {cat:'INFANTIL B - 2a REGIONAL G-8',       key:'infantil_b'},
  {cat:'INFANTIL FEMENINO G-4',            key:'infantil_femenino'}
];

var EQUIPOS_F8 = [
  {cat:'ALEVIN A - 2o ANO',    key:'alevin_a'},
  {cat:'ALEVIN B - 2o ANO',    key:'alevin_b'},
  {cat:'BENJAMIN A - 2o ANO',  key:'benjamin_a'},
  {cat:'BENJAMIN B - 1er ANO', key:'benjamin_b'},
  {cat:'PREBENJAMIN A',        key:'prebenjamin_a'},
  {cat:'PREBENJAMIN B',        key:'prebenjamin_b'},
  {cat:'ALEVIN FEMENINO',      key:'alevin_femenino'}
];

var CAMPOS_PROPIOS = ['burjassot','oliveras','polideportivo mpal. burja','pol mpal burja'];
var DIAS = {0:'Domingo',1:'Lunes',2:'Martes',3:'Miércoles',4:'Jueves',5:'Viernes',6:'Sábado'};
var MESES_NOMBRE = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function esCampoPropio(campo) {
  if (!campo) return false;
  var c = campo.toLowerCase();
  return CAMPOS_PROPIOS.some(function(p){return c.indexOf(p)!=-1;}) ||
         c.indexOf('burjassot')!==-1 || c.indexOf('oliveras')!==-1;
}

function formatFechaHora(fecha, hora) {
  // fecha puede ser "26-04-2026", "2026-04-26", o un objeto Date serializado
  var txt = (fecha||'').toString().trim();
  var diaNom = '', dia = '', mes = '';

  // Si contiene letras raras o GMT es un objeto Date — extraer solo la parte numérica
  if (txt.indexOf('GMT') !== -1 || txt.indexOf('Sun') !== -1 || txt.indexOf('Mon') !== -1 ||
      txt.indexOf('Tue') !== -1 || txt.indexOf('Wed') !== -1 || txt.indexOf('Thu') !== -1 ||
      txt.indexOf('Fri') !== -1 || txt.indexOf('Sat') !== -1) {
    try {
      var d2 = new Date(txt);
      if (!isNaN(d2.getTime())) {
        diaNom = DIAS[d2.getDay()] || '';
        dia    = d2.getDate().toString();
        mes    = MESES_NOMBRE[d2.getMonth()]||'';
      }
    } catch(e) {}
  } else {
    // formato DD-MM-YYYY o YYYY-MM-DD
    var parts = txt.split(/[-\/]/);
    if (parts.length === 3) {
      var dd, mm, yyyy;
      if (parts[0].length === 4) { yyyy=parts[0]; mm=parts[1]; dd=parts[2]; }
      else                       { dd=parts[0];   mm=parts[1]; yyyy=parts[2]; }
      var d3 = new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd));
      if (!isNaN(d3.getTime())) {
        diaNom = DIAS[d3.getDay()] || '';
        dia    = dd;
        mes    = MESES_NOMBRE[parseInt(mm)-1] || '';
      }
    }
  }

  // Hora: limpiar si viene como "Sat Dec 30 1899 19:00:00 GMT..."
  var horaLimpia = (hora||'').toString().trim();
  if (horaLimpia.indexOf('GMT') !== -1 || horaLimpia.length > 10) {
    var match = horaLimpia.match(/(\d{1,2}):(\d{2})/);
    if (match) {
      var h = parseInt(match[1]);
      var m = match[2];
      // Si año es 1899 la hora es un valor serial de Excel — extraer del string
      horaLimpia = h + ':' + m;
    } else {
      horaLimpia = '';
    }
  }

  if (!dia && !diaNom) return '<div class="hora" style="color:#999">-</div>';

  return '<div class="fecha">' + diaNom.toUpperCase() + ' ' + dia + ' ' + mes.substring(0,3).toUpperCase() + '</div>' +
         (horaLimpia ? '<div class="hora">' + horaLimpia + ' h</div>' : '');
}

function getSemana() {
  var hoy    = new Date();
  var dia    = hoy.getDay();
  var lunes  = new Date(hoy); lunes.setDate(hoy.getDate()-(dia===0?6:dia-1));
  var domingo= new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var m      = MESES_NOMBRE[domingo.getMonth()];
  return lunes.getDate() + '-' + domingo.getDate() + '-' + domingo.getDate() + ' ' + m.toUpperCase();
}

function getSemanaTexto() {
  var hoy    = new Date();
  var dia    = hoy.getDay();
  var lunes  = new Date(hoy); lunes.setDate(hoy.getDate()-(dia===0?6:dia-1));
  var domingo= new Date(lunes); domingo.setDate(lunes.getDate()+6);
  var m      = MESES_NOMBRE[domingo.getMonth()];
  return lunes.getDate() + ' - ' + domingo.getDate() + ' ' + m.toUpperCase() + ' ' + domingo.getFullYear();
}

function esDiaDestacado(fecha_str) {
  // Devuelve true si es viernes, sábado o domingo
  try {
    var parts = (fecha_str||'').split('-');
    if (parts.length === 3) {
      var d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
      var dia = d.getDay();
      return dia === 0 || dia === 5 || dia === 6; // dom, vie, sab
    }
  } catch(e) {}
  return false;
}

function filaTabla(eq, partido) {
  if (!partido) {
    return '<tr><td class="td-cat">' + eq.cat + '</td>' +
      '<td colspan="4" class="td-none">SIN PARTIDO ESTA SEMANA</td>' +
      '<td></td></tr>';
  }
  var es_local  = partido.condicion === 'Local';
  var SILOS = 'LOS SILOS CF-PROMISES VALENCIA';
  // Limpiar rival — puede venir como partido completo "Los Silos X - Rival Y"
  var rival_raw = (partido.rival||'');
  var rival_limpio = rival_raw;
  // Si contiene "Los Silos" o "Promises Valencia", extraer la parte que no es Los Silos
  if (rival_raw.toLowerCase().indexOf('silos') !== -1 || rival_raw.toLowerCase().indexOf('promises') !== -1) {
    // Partir por " - " y coger la parte que no contenga "silos"
    var partes = rival_raw.split(' - ');
    for (var pi = 0; pi < partes.length; pi++) {
      if (partes[pi].toLowerCase().indexOf('silos') === -1 && partes[pi].trim().length > 2) {
        rival_limpio = partes[pi].trim();
        break;
      }
    }
  }
  var local     = es_local ? SILOS : rival_limpio;
  var visitante = es_local ? rival_limpio : SILOS;
  var campo_cls = esCampoPropio(partido.campo) ? 'td-campo propio' : 'td-campo';

  var fin_sem = esDiaDestacado(partido.fecha) ? ' fin-semana' : '';
  return '<tr class="' + fin_sem + '">' +
    '<td class="td-cat">' + eq.cat + '</td>' +
    '<td class="td-dia">' + formatFechaHora(partido.fecha, partido.hora) + '</td>' +
    '<td class="td-equipo' + (es_local ? ' nuestro' : '') + '">' + local + '</td>' +
    '<td class="td-equipo' + (!es_local ? ' nuestro' : '') + '">' + visitante + '</td>' +
    '<td class="' + campo_cls + '">' + (partido.campo||'-') + '</td>' +
    '<td class="td-char">LIGA</td>' +
  '</tr>';
}

function buildTabla(equipos, datos) {
  var cabeceras = '<thead><tr>' +
    '<th class="th-cat" style="width:20%">CATEGORÍA</th>' +
    '<th style="width:13%">DIA - HORA</th>' +
    '<th style="width:24%">LOCAL</th>' +
    '<th style="width:24%">VISITANTE</th>' +
    '<th style="width:14%">CAMPO / UBICACIÓN</th>' +
    '<th style="width:5%">TIPO</th>' +
  '</tr></thead>';

  var filas = equipos.map(function(eq) {
    return filaTabla(eq, datos[eq.key]);
  }).join('');

  return '<table class="tabla">' + cabeceras + '<tbody>' + filas + '</tbody></table>';
}

async function cargar() {
  var datos = {};
  var todos  = EQUIPOS_F11.concat(EQUIPOS_F8);

  for (var i = 0; i < todos.length; i++) {
    var eq = todos[i];
    try {
      var r = await fetch(WEBAPP_URL+'?action=proximos&categoria='+eq.key).then(function(r){return r.json();});
      if (r.ok && r.proximos && r.proximos.length) {
        datos[eq.key] = r.proximos[0];
      }
    } catch(e) {}
  }

  var semana = getSemanaTexto();
  var ahora  = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

  var html = '<div class="doc">' +
    // HEADER
    '<div class="doc-header">' +
      '<div class="hdr-logo-left">' +
        '<div class="logo-placeholder">LOS<br>SILOS<br>CF</div>' +
      '</div>' +
      '<div class="hdr-center">' +
        '<div class="hdr-club">LOS SILOS CF — PROMISES VALENCIA</div>' +
        '<div class="hdr-semana">SEMANA ' + semana + '</div>' +
      '</div>' +
      '<div class="hdr-ffcv"><div class="ffcv-ph">FFCV</div></div>' +
      '<div class="hdr-logo-right">' +
        '<div class="pat-label">Patrocinadores</div>' +
        '<div class="pat-placeholder">LOGO</div>' +
      '</div>' +
    '</div>' +

    // F11
    '<div class="seccion">' +
      '<div class="sec-titulo f11">⚽ FÚTBOL 11</div>' +
      buildTabla(EQUIPOS_F11, datos) +
    '</div>' +

    '<div class="sep"></div>' +

    // F8
    '<div class="seccion">' +
      '<div class="sec-titulo f8">🏃 FÚTBOL 8</div>' +
      buildTabla(EQUIPOS_F8, datos) +
    '</div>' +

    // FOOTER
    '<div class="doc-footer">' +
      '<span>⚽ Los Silos CF — Promises Valencia - Temporada 2025/26 · Burjassot</span>' +
      '<span>Generado: ' + ahora + '</span>' +
    '</div>' +
  '</div>';

  document.getElementById('documento').innerHTML = html;
  document.getElementById('documento').style.display = 'block';
  document.getElementById('loading').style.display   = 'none';
}

window.addEventListener('DOMContentLoaded', cargar);
</script>
<!-- MODAL EMAIL -->
<div id="modal-email" style="display:none;position:fixed;inset:0;background:#0007;z-index:100;display:none;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;padding-bottom:40px">
    <h2 style="font-size:17px;font-weight:700;margin-bottom:4px">📧 Enviar calendario por email</h2>
    <p style="font-size:13px;color:#999;margin-bottom:14px">El calendario de la semana se enviará al destinatario indicado</p>
    <div style="margin-bottom:10px">
      <label style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;display:block;margin-bottom:4px">Email destinatario</label>
      <input type="email" id="email-dest" placeholder="ejemplo@gmail.com" style="width:100%;padding:12px 14px;border:.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;outline:none">
    </div>
    <div style="margin-bottom:10px">
      <label style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;display:block;margin-bottom:4px">Nombre (opcional)</label>
      <input type="text" id="email-nombre" placeholder="Director deportivo" style="width:100%;padding:12px 14px;border:.5px solid #ddd;border-radius:10px;font-size:15px;font-family:inherit;outline:none">
    </div>
    <button onclick="enviarEmail()" style="width:100%;padding:14px;background:#1A3A6B;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px">Enviar</button>
    <button onclick="cerrarModalEmail()" style="width:100%;padding:12px;background:#f0f4f8;color:#666;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">Cancelar</button>
  </div>
</div>

<script>
function abrirModalEmail() {
  document.getElementById('modal-email').style.display = 'flex';
}
function cerrarModalEmail() {
  document.getElementById('modal-email').style.display = 'none';
}

async function enviarEmail() {
  var email  = document.getElementById('email-dest').value.trim();
  var nombre = document.getElementById('email-nombre').value.trim();
  if (!email || !email.includes('@')) { alert('Introduce un email válido'); return; }

  var btn = event.target;
  btn.textContent = 'Enviando...';
  btn.disabled = true;

  try {
    var r = await fetch(WEBAPP_URL + '?action=enviar_calendario&email=' + encodeURIComponent(email) + '&nombre=' + encodeURIComponent(nombre)).then(function(r){return r.json();});
    if (r.ok) {
      alert('✅ Calendario enviado a ' + email);
      cerrarModalEmail();
    } else {
      alert('Error: ' + (r.error||'No se pudo enviar'));
    }
  } catch(e) {
    alert('Error de conexión');
  }
  btn.textContent = 'Enviar';
  btn.disabled = false;
}

function compartirWhatsApp() {
  var semana = document.querySelector('.hdr-semana') ? document.querySelector('.hdr-semana').textContent : 'esta semana';
  var msg = '⚽ *LOS SILOS CF — PROMISES VALENCIA*

' +
    '📅 *' + semana + '*

' +
    'Consulta el calendario completo de partidos:
' +
    'https://danielet21.github.io/lossilos-club-app/calendario_semanal.html

' +
    '_Los Silos CF · Burjassot_';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}
</script>
</body>
</html>
